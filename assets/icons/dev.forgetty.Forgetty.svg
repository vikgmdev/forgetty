<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background: rounded rectangle in Catppuccin Mocha "Surface0" dark indigo -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="#313244"/>
  <!-- Subtle inner border for depth -->
  <rect x="6" y="6" width="116" height="116" rx="18" ry="18" fill="none" stroke="#45475a" stroke-width="1.5"/>
  <!-- Terminal prompt ">" chevron in Catppuccin Mocha "Mauve" -->
  <path d="M30 42 L58 64 L30 86" fill="none" stroke="#cba6f7" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Underscore cursor "_" in Catppuccin Mocha "Text" -->
  <rect x="66" y="78" width="32" height="8" rx="3" ry="3" fill="#cdd6f4"/>
</svg>
